<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<script>
function moveSliderValue(slider) {
    const value = document.getElementById("activityValue");

    value.textContent = slider.value;

    const min = parseFloat(slider.min);
    const max = parseFloat(slider.max);
    const val = parseFloat(slider.value);

    const percent = (val - min) / (max - min);

    value.style.left = `${percent * 100}%`;
}

window.onload = function () {
    moveSliderValue(document.getElementById("physical_activity"));
};
</script>

<body>
    <div class="navbar">
        <div>
           <h1><b>
            <a href="index.html">Sleep Disorder Predictor</a>
        </b></h1>
        </div>
        <nav id="links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('info') }}">Know More</a>
            <a href="{{ url_for('predict') }}">Predict</a>
        </nav>
    </div>

    <section class="predict-section">

    <div class="predict-card">

        <h2>Sleep Disorder Prediction</h2>

        <p>
            Fill in your sleep and lifestyle information below.
        </p>

        <form action="{{ url_for('predict') }}" method="POST">

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Occupation</label>
                <select name="occupation" required>
                    <option value="">Select Occupation</option>
                    <option value="Doctor">Doctor</option>
                    <option value="Driver">Driver</option>
                    <option value="Engineer">Engineer</option>
                    <option value="Lawyer">Lawyer</option>
                    <option value="Manager">Manager</option>
                    <option value="Nurse">Nurse</option>
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Technician">Technician</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sleep Duration (Hours)</label>
                <input type="number" step="0.1" name="sleep_duration" required>
            </div>

            <div class="form-group">
                <label>Quality of Sleep (1-10)</label>
                <input type="number" min="1" max="10" name="quality_of_sleep" required>
            </div>

            <div class="form-group">
                <label for="physical_activity">Physical Activity</label>

                <div class="slider-container">
                    <input
                        type="range"
                        id="physical_activity"
                        name="physical_activity"
                        min="0"
                        max="3"
                        step="0.1"
                        value="1.5"
                        oninput="moveSliderValue(this)">

                    <span id="activityValue" class="slider-value">1.5</span>
                </div>
            </div>

            <div class="form-group">
                <label>Stress Level (1-10)</label>
                <input type="number" min="1" max="10" name="stress_level" required>
            </div>

            <div class="form-group">
                <label>BMI</label>
                <input type="number" step="0.1" name="bmi" required>
            </div>

            <div class="form-group">
                <label>Heart Rate</label>
                <input type="number" name="heart_rate" required>
            </div>

            <div class="form-group">
                <label>Daily Steps</label>
                <input type="number" name="daily_steps" required>
            </div>

            <div class="form-group">
                <label>Sleep Efficiency (%)</label>
                <input type="number" step="0.1" name="sleep_efficiency" required>
            </div>

            <div class="form-group">
                <label>BMI Category</label>
                <select name="bmi_category" required>
                    <option value="">Select</option>
                    <option>Underweight</option>
                    <option>Normal</option>
                    <option>Overweight</option>
                    <option>Obese</option>
                </select>
            </div>

            <button type="submit" class="btn">
                Predict Sleep Disorder
            </button>

        </form>

    </div>

</section>
</body>
</html>
