<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="navbar">
        <div>
           <h1><b>
            <a href="index.html">Sleep Disorder Predictor</a>
        </b></h1>
        </div>
        <nav id="links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('info') }}">Know More</a>
            <a href="{{ url_for('predict') }}">Predict</a>
        </nav>
    </div>

    <section class="result-section">

    <div class="result-card">

        <i class="fa-solid fa-moon result-icon"></i>

        <h2>Your Prediction</h2>

        <h1 class="prediction">
            {{ prediction }}
        </h1>

        <p class="result-text">
            This prediction is generated using our machine learning model based on the information you provided.
        </p>

        <div class="result-buttons">

            <a href="{{ url_for('predict') }}" class="btn">
                Predict Again
            </a>

            <a href="{{ url_for('info') }}" class="btn secondary-btn">
                Learn More
            </a>

        </div>

    </div>

</section>
    
</body>
</html>
